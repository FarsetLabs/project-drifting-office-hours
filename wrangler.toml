name = "create-an-event-through-slack"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# Secrets are set via `wrangler secret put` or GitHub Actions, not here:
#   SLACK_SIGNING_SECRET          — from Slack app's Basic Information page
#   SLACK_BOT_TOKEN               — xoxb-... from OAuth & Permissions
#   GOOGLE_SERVICE_ACCOUNT_JSON   — full JSON key for the service account
#   GOOGLE_CALENDAR_ID            — Farset Labs Events calendar ID
#   GOOGLE_IMPERSONATE_SUBJECT    — Workspace user the SA impersonates via DWD (e.g. services@farsetlabs.org.uk)
#   ROOMS_JSON                    — JSON array of { name, email, capacity } room records
#   STRIPE_SECRET_KEY             — restricted Stripe key (rk_live_... or rk_test_...) with read on Customers + Subscriptions
#   STRIPE_MEMBERSHIP_PRICE_IDS   — comma-separated Stripe Price IDs that count as membership
#   MEMBERSHIP_SIGNUP_URL         — link non-members are pointed to (e.g. https://www.farsetlabs.org.uk/)
#   STRIPE_BILLING_PORTAL_URL     — Stripe customer portal login link for self-service email/payment updates
#   DOOR_CODE                     — current Farset Labs door code, surfaced via /door-code to members
#   BUSINESS_PARK_GATES_PASSWORD  — password for the business park security telecom (after-hours gate access)
#   WIFI_MEMBER_SSID              — members-only Wi-Fi network name
#   WIFI_MEMBER_PASSWORD          — members-only Wi-Fi password
#   WIFI_GUEST_SSID               — guest Wi-Fi network name (shared with non-members and visitors)
#   WIFI_GUEST_PASSWORD           — guest Wi-Fi password
#   EVENTS_CHANNEL_ID             — (optional) Slack channel ID to announce bookings to (e.g. C0123ABC456)
